spring:
  application:
    name: ${APP_NAME:notes-app}

  # --- Database Configuration ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notesdb}
    username: ${DB_USERNAME:notesuser}
    password: ${DB_PASSWORD:notespass123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # --- Redis Configuration ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# --- Server Configuration ---
server:
  port: ${SERVER_PORT:8081}

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
