# Level 5 Solution: Production-Ready Orchestration
services:
  # ---------- PostgreSQL (Persistence & Health) ----------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=notesdb
      - POSTGRES_USER=notesuser
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password # Fix: Use the secret file
    secrets:
      - db_password # Level 5: Hidden Secrets
    volumes:
      - postgres_data:/var/lib/postgresql/data # Level 3: Persistence
    networks:
      - internal-network # Level 3: Isolated Network
    healthcheck: # Level 4: Reliability
      test: ["CMD-SHELL", "pg_isready -U notesuser -d notesdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis (Caching & Health) ----------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal-network
    healthcheck: # Level 4: Reliability
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Notes API (The Core) ----------
  app:
    build:
      context: ..
      dockerfile: solution/Dockerfile # Level 2: Multi-stage Build
    ports:
      - "${APP_PORT:-8081}:8081" # Level 1: Mapping
    environment: # Level 1-5: Configuration
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD} 
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_PORT=8081
      - APP_NAME=${APP_NAME} 
    secrets: # Level 5: Secrets
      - db_password
    deploy:
      resources:
        limits: # Level 4: Guard Rails
          cpus: '0.50'
          memory: 512M
    depends_on:
      db:
        condition: service_healthy # Level 4: Orchestration
      redis:
        condition: service_healthy
    networks:
      - internal-network

# Level 3: Resources
networks:
  internal-network:
    driver: bridge

volumes:
  postgres_data:

# Level 5: Secret Definition
secrets:
  db_password:
    file: ../db_password.txt # Using the file from parent for demo consistency
