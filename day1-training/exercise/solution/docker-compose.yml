# ===========================================
# Solution: Docker Compose — Notes API
# ===========================================

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: notes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: notesuser
      POSTGRES_PASSWORD: notespass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - notes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesuser -d notesdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: notes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - notes-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Notes API ----------
  notes-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notes-app
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notesdb
      DB_USERNAME: notesuser
      DB_PASSWORD: notespass123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8081
      APP_NAME: "Notes API"
      APP_ENV: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
