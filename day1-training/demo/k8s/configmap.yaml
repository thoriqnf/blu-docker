# ===========================================
# ConfigMap — Application Configuration
# ===========================================
# Stores non-sensitive configuration data.
# These values are injected as environment
# variables into the Todo App container.
# ===========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-app-config
  namespace: todo-app
  labels:
    app: todo
    component: config
data:
  # Application settings
  APP_NAME: "Todo API"
  APP_VERSION: "1.0.0"
  APP_ENV: "production"
  SERVER_PORT: "8080"

  # Database connection (non-sensitive)
  DB_HOST: "todo-postgres-service"
  DB_PORT: "5432"
  DB_NAME: "tododb"
