# ===========================================
# Service — Expose Todo API
# ===========================================
# Makes the Todo App accessible within the
# cluster (ClusterIP) or externally (NodePort).
# ===========================================
apiVersion: v1
kind: Service
metadata:
  name: todo-app-service
  namespace: todo-app
  labels:
    app: todo
    component: api
spec:
  type: NodePort
  selector:
    app: todo
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 80            # Service port (internal)
      targetPort: 8080     # Container port
      nodePort: 30080      # External access port
