services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass123
    # 1. Healthcheck: Only mark as healthy when pg_isready returns 0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todouser -d tododb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./todo-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tododb
      DB_USERNAME: todouser
      DB_PASSWORD: todopass123
    # 2. Advanced depends_on: Wait for healthcheck to pass!
    depends_on:
      db:
        condition: service_healthy
    # 3. Resource Limits (Cgroups)
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
