# ============================================
# Todo API — Application Configuration
# ============================================
# This configuration uses environment variables
# with sensible defaults for local development.
# In Docker/K8s, these are overridden via
# environment variables, ConfigMaps, and Secrets.
# ============================================

spring:
  application:
    name: ${APP_NAME:todo-app}

  # --- Database Configuration ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tododb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# --- Server Configuration ---
server:
  port: ${SERVER_PORT:8080}

# --- Actuator (Health Checks) ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# --- App Info ---
app:
  name: ${APP_NAME:Todo API}
  version: ${APP_VERSION:1.0.0}
  environment: ${APP_ENV:development}
