# ===========================================
# Secret — Sensitive Configuration
# ===========================================
# Stores sensitive data like database credentials.
# Values are base64 encoded (NOT encrypted!).
# In production, use external secret managers
# (e.g., HashiCorp Vault, AWS Secrets Manager).
#
# To encode:  echo -n "value" | base64
# To decode:  echo "dG9kb3VzZXI=" | base64 -d
# ===========================================
apiVersion: v1
kind: Secret
metadata:
  name: todo-app-secret
  namespace: todo-app
  labels:
    app: todo
    component: secret
type: Opaque
data:
  # echo -n "todouser" | base64
  DB_USERNAME: dG9kb3VzZXI=
  # echo -n "todopass123" | base64
  DB_PASSWORD: dG9kb3Bhc3MxMjM=
