apiVersion: apps/v1
kind: Deployment
metadata:
  name: networking-app
  labels:
    app: networking-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: networking-app
  template:
    metadata:
      labels:
        app: networking-app
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: html-volume
        configMap:
          name: networking-demo-html
---
apiVersion: v1
kind: Service
metadata:
  name: clusterip-service
spec:
  type: ClusterIP
  selector:
    app: networking-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
