apiVersion: v1
kind: ConfigMap
metadata:
  name: networking-demo-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DevOps Day 2 - Demo 2</title>
        <style>
            body {
                font-family: 'Outfit', sans-serif;
                background-color: #0f172a;
                color: #f8fafc;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
                overflow: hidden;
            }
            .container {
                text-align: center;
                padding: 3rem;
                background: rgba(30, 41, 59, 0.7);
                backdrop-filter: blur(10px);
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                max-width: 600px;
                animation: fadeIn 1s ease-out;
            }
            h1 {
                font-size: 3rem;
                background: linear-gradient(to right, #10b981, #3b82f6);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 1rem;
            }
            p {
                font-size: 1.25rem;
                color: #94a3b8;
                margin-bottom: 2rem;
            }
            .badge {
                display: inline-block;
                padding: 0.5rem 1rem;
                background: #064e3b;
                color: #34d399;
                border-radius: 9999px;
                font-size: 0.875rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .info-grid {
                display: grid;
                grid-template-cols: 1fr 1fr;
                gap: 1rem;
                margin-top: 2rem;
                text-align: left;
            }
            .info-item {
                background: #1e293b;
                padding: 1rem;
                border-radius: 12px;
                border: 1px solid #334155;
            }
            .info-label {
                font-size: 0.75rem;
                color: #64748b;
                text-transform: uppercase;
                font-weight: bold;
            }
            .info-value {
                font-size: 0.9rem;
                color: #e2e8f0;
                font-family: 'Fira Code', monospace;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="badge">Networking Demo</div>
            <h1>Connected!</h1>
            <p>You are accessing the service via Kubernetes networking.</p>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Service Type</div>
                    <div class="info-value" id="svc-type">Detection...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Target Port</div>
                    <div class="info-value">80</div>
                </div>
            </div>
        </div>
        <script>
            // Simple logic to show which service type is being used based on URL
            const url = window.location.href;
            const svcType = document.getElementById('svc-type');
            if (url.includes('30080')) svcType.textContent = 'NodePort';
            else if (url.includes('127.0.0.1')) svcType.textContent = 'LoadBalancer (Tunnel)';
            else svcType.textContent = 'ClusterIP / Unknown';
        </script>
    </body>
    </html>
