name: CI/CD Pipeline to Kubernetes

# This is an example workflow for training purposes.
# It demonstrates a traditional "Push" deployment model.

on:
  push:
    branches: [ "main" ]

env:
  # Registry and Image settings
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  
  # Kubernetes settings
  K8S_NAMESPACE: production
  DEPLOYMENT_NAME: my-app-deployment

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout the source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login to Docker Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build and push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # We use the Git SHA as a unique tag for the image!
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # 4. Authenticate to the Kubernetes Cluster
      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          # This Kubeconfig is stored securely in GitHub Secrets!
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # 5. Deploy the new image to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          # Use `kubectl set image` to update the Deployment with the new tag
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            app-container=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}
            
          # Wait for the rollout to complete successfully
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.K8S_NAMESPACE }}
