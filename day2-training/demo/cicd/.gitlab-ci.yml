stages:
  - build
  - deploy

variables:
  # Unique image tag using the Git commit SHA
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  K8S_NAMESPACE: production

# 1. Build Phase: Create the Docker image and push to GitLab Registry
build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Docker image..."
    - docker build -t $IMAGE_TAG .
    - echo "Pushing Docker image to registry..."
    - docker push $IMAGE_TAG
  only:
    - main

# 2. Deploy Phase: Apply changes to Kubernetes
deploy_to_k8s:
  stage: deploy
  image: bitnami/kubectl:latest
  environment:
    name: production
  before_script:
    # Set up kubeconfig from GitLab CI/CD Variable
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - echo "Deploying to Kubernetes cluster..."
    # Update the Deployment to use the new image tag
    - kubectl set image deployment/our-frontend-app web=$IMAGE_TAG -n $K8S_NAMESPACE
    # Wait for the pods to restart and become healthy
    - kubectl rollout status deployment/our-frontend-app -n $K8S_NAMESPACE
  only:
    - main
