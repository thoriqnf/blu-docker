# ==============================================================
# DEBUGGING DEMO 3: Pending / PVC Issue
# ==============================================================
# Run: `kubectl apply -f 03-pending-pvc.yaml`
# Run: `kubectl get pods` (Observe the Pending status)
# Run: `kubectl describe pod <pod-name>` 
# (See warning: "unbound immediate PersistentVolumeClaims")
#
# Fix: Create the missing PersistentVolumeClaim
# ==============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-pending
  labels:
    app: stuck-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stuck-app
  template:
    metadata:
      labels:
        app: stuck-app
    spec:
      containers:
        - name: web
          image: nginx:alpine
          volumeMounts:
            - name: data-volume
              mountPath: /usr/share/nginx/html
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            # INTENTIONAL BUG: This PVC doesn't exist, so the pod
            # can never be scheduled ("Pending").
            claimName: missing-pvc-claim
